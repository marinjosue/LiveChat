name: Block Invalid PR Flow

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  validate-pr-flow:
    name: Validate PR Flow
    runs-on: ubuntu-latest
    
    steps:
      - name: Check source branch
        id: check
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"
          
          echo "Source: $SOURCE_BRANCH"
          echo "Target: $TARGET_BRANCH"
          
          if [ "$SOURCE_BRANCH" = "dev" ] && [ "$TARGET_BRANCH" = "main" ]; then
            echo "invalid_flow=true" >> $GITHUB_OUTPUT
            echo "FLUJO INVALIDO: dev → main NO esta permitido"
          elif [ "$SOURCE_BRANCH" = "test" ] && [ "$TARGET_BRANCH" = "main" ]; then
            echo "invalid_flow=false" >> $GITHUB_OUTPUT
            echo "FLUJO VALIDO: test → main"
          elif [ "$TARGET_BRANCH" = "main" ]; then
            echo "invalid_flow=true" >> $GITHUB_OUTPUT
            echo "FLUJO INVALIDO: Solo test → main esta permitido"
          fi
      
      - name: Label invalid flow
        if: steps.check.outputs.invalid_flow == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['invalid-flow', 'blocked']
            });
      
      - name: Comment on invalid PR
        if: steps.check.outputs.invalid_flow == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## FLUJO DE TRABAJO INVALIDO
            
            Este Pull Request no sigue el flujo obligatorio.
            
            ### Flujo Requerido:
            
            \`\`\`
            dev → test → main
            \`\`\`
            
            ### Tu PR intenta:
            \`\`\`
            ${{ github.head_ref }} → ${{ github.base_ref }}
            \`\`\`
            
            ### Pasos Correctos:
            
            1. Cierra este PR
            2. Crea un PR: \`dev\` → \`test\`
            3. Espera validacion ML (automatica)
            4. Si es seguro: Merge automatico a \`test\`
            5. Tests automaticos se ejecutan en \`test\`
            6. Si pasan: Se crea PR automatico \`test\` → \`main\`
            7. Mergea ese PR para desplegar a produccion
            
            ### Por que este flujo?
            
            - Seguridad: Codigo pasa por analisis ML primero
            - Calidad: Tests se ejecutan en ambiente de staging
            - Trazabilidad: Cada etapa queda documentada
            - Automatizacion: Merges y PRs se crean automaticamente
            
            ### Documentacion
            
            Lee el flujo completo en: [\`.github/FLUJO_PIPELINE.md\`](https://github.com/${{ github.repository }}/blob/dev/.github/FLUJO_PIPELINE.md)
            
            ---
            
            Este PR sera cerrado automaticamente. Por favor sigue el flujo correcto.*`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      
      - name: Notify invalid flow
        if: steps.check.outputs.invalid_flow == 'true'
        run: |
          MESSAGE="FLUJO INVALIDO DETECTADO%0A%0A"
          MESSAGE+="PR Bloqueado: #${{ github.event.pull_request.number }}%0A"
          MESSAGE+="Autor: @${{ github.event.pull_request.user.login }}%0A"
          MESSAGE+="Intento: ${{ github.head_ref }} → ${{ github.base_ref }}%0A%0A"
          MESSAGE+="Este flujo NO esta permitido%0A%0A"
          MESSAGE+="Flujo correcto:%0A"
          MESSAGE+="   1. dev → test (analisis ML)%0A"
          MESSAGE+="   2. test → main (despues de tests)%0A%0A"
          MESSAGE+="Accion requerida:%0A"
          MESSAGE+="   - Cerrar este PR%0A"
          MESSAGE+="   - Crear PR: dev → test%0A%0A"
          MESSAGE+="Ver PR Bloqueado: ${{ github.event.pull_request.html_url }}"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML"
      
      - name: Close invalid PR
        if: steps.check.outputs.invalid_flow == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
            
            console.log('PR cerrado por flujo invalido');
      
      - name: Fail workflow for invalid flow
        if: steps.check.outputs.invalid_flow == 'true'
        run: |
          echo "PIPELINE BLOQUEADO"
          echo "Este PR no sigue el flujo obligatorio: dev → test → main"
          echo "El PR ha sido cerrado automaticamente"
          exit 1
      
      - name: Valid flow detected
        if: steps.check.outputs.invalid_flow == 'false'
        run: |
          echo "Flujo valido detectado: test → main"
          echo "Este PR puede continuar normalmente"
